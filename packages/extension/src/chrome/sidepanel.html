<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Assistant</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <h1>LLM Assistant</h1>
      <button id="new-session-btn" title="New session">+</button>
      <button id="history-btn" title="Session history">&#x1f552;</button>
    </div>
    <select id="model-select">
      <option value="anthropic:claude-sonnet-4-20250514">Claude Sonnet 4</option>
      <option value="openai:gpt-5.2">GPT 5.2</option>
      <option value="google:gemini-3-flash-preview">Gemini 3 Flash</option>
      <option value="deepseek:deepseek">DeepSeek</option>
    </select>
  </header>

  <div id="history-panel" class="hidden">
    <div id="history-list"></div>
    <div id="history-empty" class="hidden">No sessions yet</div>
  </div>

  <main id="messages">
    <div id="start-view">
      <p>Read and understand this page with AI</p>
      <button id="start-btn">Start</button>
    </div>
  </main>

  <footer>
    <div id="status" class="hidden"></div>
    <form id="input-form">
      <textarea id="input" placeholder="Ask about this page..." rows="1"></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </footer>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
